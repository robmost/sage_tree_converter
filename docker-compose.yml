services:
  converter:
    build: .
    volumes:
      # Map the whole codebase read-write for the LLM to inspect and edit
      - .:/app
      # Dynamically link external directories if provided in .env, otherwise default to local input/output
      - ${INPUT_DIR:-./input}:/app/input
      - ${OUTPUT_DIR:-./output}:/app/output
    environment:
      # Pass through the API keys explicitly
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Set writable cache directories for the unprivileged host user
      - HOME=/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
      # Force 256-color terminal support to prevent UI rendering errors
      - TERM=xterm-256color
    # Attach standard input and allocate a pseudo-TTY for interactive CLI usage
    stdin_open: true
    tty: true
    # Use host user IDs so that converted data isn't locked as 'root'
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
